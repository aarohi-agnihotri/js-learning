<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APIS 2</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      #flex-container {
        height: 100vh;
        width: 100vw;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: rgb(133, 66, 19);
      }

      #card {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        height: 500px;
        width: 300px;
        background-color: beige;
        border-radius: 10px;
        display: none;
      }

      img {
        background-color: palegreen;
        border-radius: 10px;
        margin-bottom: 1rem;
      }

      #btn {
        background-color: burlywood;
        font-size: 2.5em;
        padding: 0.5rem 1rem;
        border-radius: 10px;
        cursor: pointer;
      }

      #btn:hover,
      #btn:active {
        background-color: rgb(235, 216, 161);
      }

    </style>
  </head>
  <body>
    <div id="flex-container">
      <button type="button" id="btn">Click</button>
      <div id="card">
        <img src="" alt="profile-photo" height="80%" width="80%" />
        <h2>Followers: <span></span></h2>
      </div>
    </div>

    <!-- <script src="script.js"></script> -->
    <script src="assignment.js"></script>
  </body>
</html>
